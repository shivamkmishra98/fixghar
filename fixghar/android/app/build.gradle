plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    // Required for Firebase
    id "com.google.gms.google-services"
}

android {
    namespace "com.example.fixghar"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        // Package name — change this to your actual package name
        applicationId "com.example.fixghar"
        minSdkVersion flutter.minSdkVersion               // Firebase Auth requires minSdk >= 19
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
        multiDexEnabled true    // Required for large apps
    }
    buildTypes {
    debug {
        minifyEnabled false
    }

    release {
        signingConfig signingConfigs.debug
        minifyEnabled false
        shrinkResources false
    }
}
    // buildTypes {
    //     release {
    //         signingConfig signingConfigs.debug
    //         minifyEnabled false
    //     }
    // }
}

flutter {
    source "../.."
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    implementation platform("com.google.firebase:firebase-bom:32.7.0")
    // FCM (push notifications)
    implementation "com.google.firebase:firebase-messaging"
}
